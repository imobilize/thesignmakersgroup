<div class="mx-auto py-12 md:py-16 lg:py-24 max-w-6xl px-4">
    <h2 class="text-4xl mb-6 font-medium">Articles</h2>
    {{ range first 3 (where site.RegularPages.ByDate.Reverse "Type" "in" site.Params.mainSections )}}
    <a href="{{ .RelPermalink }}">{{ partial "summary.html" . }}</a>
    {{ end }}

    <div class="flex flex-wrap justify-center text-gray-300 my-5">
        <a href="articles/"
            class="duration-200 px-6 py-3 bg-tlgray-800 hover:opacity-80 hover:text-white relative focus:outline-none text-base text-center flex flex-row items-center justify-center gap-2 font-medium">
            All Artciles <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-chevron-right" viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                    d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708" />
            </svg>
        </a>
    </div>
</div>
