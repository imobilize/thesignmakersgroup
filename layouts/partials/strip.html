{{if .Site.Data.features}}
<div class="bg-slate-800 py-12 md:py-16 lg:py-24">
    <div class="container mx-auto max-w-7xl px-4">
        <h2 class="text-white text-3xl font-semibold text-center mb-12">Portfolio</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {{ range .Site.Data.features }}
            <a href="{{ .website }}" target="_blank" rel="noopener noreferrer">
                <div
                    class="bg-white text-center mx-auto p-8 flex flex-col justify-center items-center duration-300 h-full hover:-translate-y-1 hover:shadow-lg rounded-lg">
                    {{if .logo }}
                    {{ $slide := resources.Get .logo }}

                    <img src="{{ $slide.Permalink }}" alt="{{ .title }}" class="h-34 mb-4 object-contain">
                    {{ end }}
                    <h3 class="text-xl font-semibold">{{ .title }}</h3>
                </div>
            </a>
            {{ end }}
        </div>
    </div>
</div>
{{end}}
